services:
  db:
    image: postgres:16
    container_name: superstore_db
    environment:
      POSTGRES_USER: superstore
      POSTGRES_PASSWORD: superstore
      POSTGRES_DB: superstore
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "superstore"]
      interval: 2s
      timeout: 2s
      retries: 15